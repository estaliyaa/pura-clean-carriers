<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TANBA — Вход</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <style>
    body {
      background-color: #fafaf9;
      background-image:
        radial-gradient(at 20% 0%, rgba(251, 191, 36, 0.08) 0, transparent 50%),
        radial-gradient(at 80% 100%, rgba(15, 23, 42, 0.04) 0, transparent 50%);
    }
    .grid-bg {
      background-image:
        linear-gradient(to right, rgba(15, 23, 42, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
    }
    @keyframes fadeIn { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
    .fade-in { animation: fadeIn 0.5s ease-out both; }
    .d-1 { animation-delay: 0.05s; }
    .d-2 { animation-delay: 0.1s; }
    .d-3 { animation-delay: 0.15s; }
    .d-4 { animation-delay: 0.2s; }
    .d-5 { animation-delay: 0.25s; }

    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-5px);} 40%{transform:translateX(5px);} 60%{transform:translateX(-3px);} 80%{transform:translateX(3px);} }
    .shake { animation: shake 0.35s ease-in-out; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* Custom input focus ring */
    .input-ring:focus {
      outline: none;
      border-color: #0f172a;
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.06);
    }
  </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-6 relative">

  <!-- Grid background -->
  <div class="absolute inset-0 grid-bg pointer-events-none"></div>

  <!-- Top bar -->
  <div class="absolute top-6 left-6 right-6 flex items-center justify-between z-10">
    <div class="flex items-center gap-2 fade-in">
      <img src="logo.svg" alt="" class="w-7 h-7">
      <span class="font-bold text-slate-900 tracking-tight">TANBA</span>
    </div>
    <div class="hidden sm:flex items-center gap-2 text-xs text-slate-500 fade-in">
      <i data-lucide="life-buoy" class="w-3.5 h-3.5"></i>
      <span>Нужна помощь? <a href="#" class="text-slate-900 font-medium hover:underline">Поддержка</a></span>
    </div>
  </div>

  <!-- Main card -->
  <div class="w-full max-w-[400px] relative z-10">

    <div class="text-center mb-8 fade-in d-1">
      <div class="inline-flex items-center justify-center w-12 h-12 mb-5">
        <img src="logo.svg" alt="TANBA" class="w-12 h-12">
      </div>
      <h1 class="text-[26px] font-bold text-slate-900 tracking-tight leading-tight">Добро пожаловать</h1>
      <p class="text-sm text-slate-500 mt-1.5">Войдите в систему «Чистые носители»</p>
    </div>

    <form id="loginForm" novalidate class="space-y-3">

      <div id="formError" class="hidden bg-red-50 border border-red-100 text-red-700 text-[13px] rounded-lg px-3.5 py-2.5 flex items-center gap-2 fade-in">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
        <span id="errorText"></span>
      </div>

      <div class="fade-in d-2">
        <label for="login" class="block text-[13px] font-medium text-slate-700 mb-1.5">Логин</label>
        <input type="text" id="login" placeholder="your.login" autocomplete="username"
          class="input-ring w-full px-3.5 py-2.5 bg-white border border-slate-200 rounded-lg text-[14px] text-slate-900 placeholder:text-slate-400 transition-all">
      </div>

      <div class="fade-in d-3">
        <div class="flex items-center justify-between mb-1.5">
          <label for="password" class="block text-[13px] font-medium text-slate-700">Пароль</label>
          <a href="#" class="text-[12px] text-slate-500 hover:text-slate-900 transition-colors">Забыли?</a>
        </div>
        <div class="relative">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
            class="input-ring w-full px-3.5 py-2.5 pr-10 bg-white border border-slate-200 rounded-lg text-[14px] text-slate-900 placeholder:text-slate-400 transition-all">
          <button type="button" id="togglePwdBtn" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-700 transition-colors">
            <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
          </button>
        </div>
      </div>

      <label for="remember" class="flex items-center gap-2 cursor-pointer select-none pt-1 fade-in d-4">
        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 accent-slate-900 cursor-pointer">
        <span class="text-[13px] text-slate-600">Запомнить меня на этом устройстве</span>
      </label>

      <button type="submit" id="submitBtn"
        class="fade-in d-5 w-full mt-2 bg-slate-900 hover:bg-slate-800 active:bg-black text-white text-[14px] font-medium py-2.5 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-sm">
        <span id="btnText">Войти в систему</span>
        <i data-lucide="arrow-right" id="btnIcon" class="w-4 h-4"></i>
        <div id="btnSpinner" class="spinner hidden"></div>
      </button>
    </form>

    <!-- Demo accounts -->
    <div class="mt-7 fade-in d-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-[11px] font-medium text-slate-400 uppercase tracking-wider">Демо-доступ</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <div class="space-y-1.5">
        <button type="button" data-login="niis.expert" data-password="Expert2026" class="demo-btn group w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-white hover:border-slate-200 border border-transparent transition-all">
          <div class="w-8 h-8 rounded-md bg-slate-900 text-white flex items-center justify-center shrink-0">
            <i data-lucide="search-check" class="w-4 h-4"></i>
          </div>
          <div class="flex-1 text-left min-w-0">
            <div class="text-[13px] font-medium text-slate-900">Эксперт НИИС</div>
            <div class="text-[11px] text-slate-500 font-mono truncate">niis.expert · Expert2026</div>
          </div>
          <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-900 transition-colors"></i>
        </button>

        <button type="button" data-login="niis.head" data-password="Head2026" class="demo-btn group w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-white hover:border-slate-200 border border-transparent transition-all">
          <div class="w-8 h-8 rounded-md bg-indigo-600 text-white flex items-center justify-center shrink-0">
            <i data-lucide="shield-check" class="w-4 h-4"></i>
          </div>
          <div class="flex-1 text-left min-w-0">
            <div class="text-[13px] font-medium text-slate-900">Руководитель НИИС</div>
            <div class="text-[11px] text-slate-500 font-mono truncate">niis.head · Head2026</div>
          </div>
          <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-900 transition-colors"></i>
        </button>

        <button type="button" data-login="opcu.manager" data-password="Opcu2026" class="demo-btn group w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-white hover:border-slate-200 border border-transparent transition-all">
          <div class="w-8 h-8 rounded-md bg-amber-500 text-white flex items-center justify-center shrink-0">
            <i data-lucide="landmark" class="w-4 h-4"></i>
          </div>
          <div class="flex-1 text-left min-w-0">
            <div class="text-[13px] font-medium text-slate-900">ОКУП</div>
            <div class="text-[11px] text-slate-500 font-mono truncate">opcu.manager · Opcu2026</div>
          </div>
          <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-900 transition-colors"></i>
        </button>

        <button type="button" data-login="importer" data-password="Import2026" class="demo-btn group w-full flex items-center gap-3 p-2.5 rounded-lg hover:bg-white hover:border-slate-200 border border-transparent transition-all">
          <div class="w-8 h-8 rounded-md bg-rose-500 text-white flex items-center justify-center shrink-0">
            <i data-lucide="truck" class="w-4 h-4"></i>
          </div>
          <div class="flex-1 text-left min-w-0">
            <div class="text-[13px] font-medium text-slate-900">Импортер</div>
            <div class="text-[11px] text-slate-500 font-mono truncate">importer · Import2026</div>
          </div>
          <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-900 transition-colors"></i>
        </button>
      </div>
    </div>

    <p class="text-center text-[11px] text-slate-400 mt-8 fade-in d-5">
      &copy; 2026 TANBA · Система НИИС
    </p>
  </div>

  <script>
    lucide.createIcons();

    const USERS = {
      'niis.expert':  { password: 'Expert2026', name: 'Айдана Ермекова',         role: 'niis_expert', title: 'Эксперт НИИС' },
      'niis.head':    { password: 'Head2026',   name: 'Бекжан Сериков',          role: 'niis_head',   title: 'Руководитель НИИС' },
      'opcu.manager': { password: 'Opcu2026',   name: 'Гульнара Тасмагамбетова', role: 'opcu',        title: 'Менеджер ОКУП' },
      'importer':     { password: 'Import2026', name: 'ТОО «Импорт Групп»',      role: 'importer',    title: 'Импортер' }
    };

    document.getElementById('togglePwdBtn').addEventListener('click', function() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') { input.type = 'text'; icon.setAttribute('data-lucide', 'eye-off'); }
      else { input.type = 'password'; icon.setAttribute('data-lucide', 'eye'); }
      lucide.createIcons();
    });

    document.querySelectorAll('.demo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('login').value = btn.dataset.login;
        document.getElementById('password').value = btn.dataset.password;
        document.getElementById('formError').classList.add('hidden');
      });
    });

    ['login', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('border-red-400');
        document.getElementById('formError').classList.add('hidden');
      });
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const login = document.getElementById('login');
      const password = document.getElementById('password');
      const errorBox = document.getElementById('formError');
      const errorText = document.getElementById('errorText');

      login.classList.remove('border-red-400');
      password.classList.remove('border-red-400');

      let hasError = false;
      if (!login.value.trim() && !password.value.trim()) {
        errorText.textContent = 'Введите логин и пароль'; login.classList.add('border-red-400'); password.classList.add('border-red-400'); hasError = true;
      } else if (!login.value.trim()) {
        errorText.textContent = 'Введите логин'; login.classList.add('border-red-400'); hasError = true;
      } else if (!password.value.trim()) {
        errorText.textContent = 'Введите пароль'; password.classList.add('border-red-400'); hasError = true;
      }

      if (hasError) {
        errorBox.classList.remove('hidden');
        document.querySelectorAll('.border-red-400').forEach(el => {
          el.classList.add('shake');
          setTimeout(() => el.classList.remove('shake'), 400);
        });
        return;
      }

      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnIcon = document.getElementById('btnIcon');
      const btnSpinner = document.getElementById('btnSpinner');

      btn.disabled = true;
      btn.classList.add('opacity-80', 'cursor-not-allowed');
      btnText.textContent = 'Вход...';
      btnIcon.classList.add('hidden');
      btnSpinner.classList.remove('hidden');

      setTimeout(() => {
        const user = USERS[login.value.trim().toLowerCase()];
        if (!user || user.password !== password.value) {
          btn.disabled = false;
          btn.classList.remove('opacity-80', 'cursor-not-allowed');
          btnText.textContent = 'Войти в систему';
          btnIcon.classList.remove('hidden');
          btnSpinner.classList.add('hidden');
          errorText.textContent = 'Неверный логин или пароль';
          errorBox.classList.remove('hidden');
          login.classList.add('border-red-400');
          password.classList.add('border-red-400');
          document.querySelectorAll('.border-red-400').forEach(el => {
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 400);
          });
          return;
        }

        btnText.textContent = 'Успешно';
        btnSpinner.classList.add('hidden');
        btnIcon.classList.remove('hidden');
        const routes = { niis_expert: 'expert/', niis_head: 'expert/', opcu: 'expert/', importer: 'expert/' };
        setTimeout(() => { window.location.href = routes[user.role] || 'expert/'; }, 400);
      }, 900);
    });
  </script>
</body>
</html>
